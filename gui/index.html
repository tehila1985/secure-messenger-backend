<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Secure Messenger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Auth ── */
    #auth {
      background: #2a2a3e;
      padding: 40px 48px;
      border-radius: 16px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #auth h1 { font-size: 1.4rem; text-align: center; margin-bottom: 6px; }
    #auth label { font-size: .8rem; color: #6c7086; margin-bottom: 2px; display: block; }
    #auth input {
      width: 100%; padding: 10px 12px;
      background: #1e1e2e; color: #cdd6f4;
      border: 1px solid #7c6af7; border-radius: 8px;
      font-size: .95rem; outline: none;
    }
    .btn-row { display: flex; gap: 10px; }
    button {
      flex: 1; padding: 10px;
      background: #7c6af7; color: #fff;
      border: none; border-radius: 8px;
      font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    button:hover { background: #6a58e0; }
    #auth-status { font-size: .82rem; text-align: center; min-height: 18px; }

    /* ── Chat ── */
    #chat {
      display: none;
      flex-direction: column;
      width: 680px; height: 90vh;
      background: #2a2a3e;
      border-radius: 16px;
      overflow: hidden;
    }
    #chat-header {
      background: #313244;
      padding: 14px 20px;
      font-weight: 700;
      font-size: 1rem;
      border-bottom: 1px solid #45475a;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msg {
      padding: 7px 12px;
      border-radius: 10px;
      max-width: 80%;
      font-size: .92rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .msg.incoming { background: #313244; color: #89dceb; align-self: flex-start; }
    .msg.outgoing { background: #45475a; color: #a6e3a1; align-self: flex-end; }
    .msg.status   { color: #6c7086; font-size: .8rem; align-self: center; font-style: italic; }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #1e1e2e;
      border-top: 1px solid #45475a;
    }
    #input-row input {
      background: #2a2a3e; color: #cdd6f4;
      border: 1px solid #45475a; border-radius: 8px;
      padding: 9px 12px; font-size: .92rem; outline: none;
    }
    #input-row input:focus { border-color: #7c6af7; }
    #to    { display: none; }
    #msg   { flex: 1; }
    #send-btn { flex-shrink: 0; padding: 9px 20px; }
  </style>
</head>
<body>

<!-- Auth -->
<div id="auth">
  <h1>🔐 Secure Messenger</h1>
  <div>
    <label>Username</label>
    <input id="username" type="text" autocomplete="off" />
  </div>
  <div>
    <label>Password</label>
    <input id="password" type="password" />
  </div>
  <div class="btn-row">
    <button onclick="doLogin()">Login</button>
    <button onclick="doRegister()">Register</button>
  </div>
  <div id="auth-status"></div>
</div>

<!-- Chat -->
<div id="chat">
  <div id="chat-header">💬 Logged in as <span id="me"></span></div>
  <div id="log"></div>
  <div id="input-row">
    <input id="to" type="hidden" value="all" />
    <input id="msg" type="text" placeholder="Type a message…" onkeydown="if(event.key==='Enter') doSend()" />
    <button id="send-btn" type="button" onclick="doSend()">Send</button>
  </div>
</div>

<script src="/gui/app.js?v=2"></script>
</body>
</html>
